<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Link Hub Saya</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #667eea, #764ba2); color: white; min-height: 100vh; }
    .card { transition: transform 0.3s; }
    .card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
  </style>
</head>
<body class="d-flex align-items-center">
  <div class="container py-5">
    <h1 class="text-center mb-5 fw-bold">Link Penting Saya</h1>
    
    <div class="row row-cols-1 row-cols-md-3 g-4">
      <div class="col">
        <div class="card text-center bg-dark text-white h-100">
          <div class="card-body">
            <h3 class="card-title">YouTube</h3>
            <p class="card-text">Channel tutorial & vlog</p>
            <a href="https://www.youtube.com/channel/UCBXYLpS-taTO0mDT-6IxXUA" class="btn btn-primary btn-lg">Buka</a>
          </div>
        </div>
      </div>
      
      <div class="col">
        <div class="card text-center bg-dark text-white h-100">
          <div class="card-body">
            <h3 class="card-title">Instagram</h3>
            <p class="card-text">Foto & story harian</p>
            <a href="https://instagram.com/rianfn" class="btn btn-primary btn-lg">Buka</a>
          </div>
        </div>
      </div>

        <div class="col">
        <div class="card text-center bg-dark text-white h-100">
          <div class="card-body">
            <h3 class="card-title">Web Puskesmas</h3>
            <p class="card-text">Informasi pekerjaan</p>
            <a href="https://puskesmasgirimulyo2.com" class="btn btn-primary btn-lg">Buka</a>
          </div>
        </div>
      </div>
      
      <!-- Tambah kotak lain sesuka hati, copy-paste blok <div class="col"> di atas -->
      
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
