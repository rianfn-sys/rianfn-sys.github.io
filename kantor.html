<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal Pegawai Puskesmas Girimulyo II</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #667eea, #764ba2); color: white; min-height: 100vh; }
    .card { transition: transform 0.3s; }
    .card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
  </style>
</head>
<body class="d-flex align-items-center">
  <div class="container py-5">
    <h1 class="text-center mb-5 fw-bold">Link Keperluan Kantor</h1>
    
    <div class="row row-cols-1 row-cols-md-3 g-4">
      <div class="col">
        <div class="card text-center bg-dark text-white h-100">
          <div class="card-body">
            <h3 class="card-title">E-TPP</h3>
            <p class="card-text">isi kegiatan harian anda dan dapatkan cuan</p>
            <a href="https://etpp.kulonprogokab.go.id/" target="_blank" class="btn btn-primary btn-lg">Buka</a>
          </div>
        </div>
      </div>
      
      <div class="col">
        <div class="card text-center bg-dark text-white h-100">
          <div class="card-body">
            <h3 class="card-title">E-Presensi</h3>
            <p class="card-text">Catat kehandiran anda dan hindari hukuman</p>
            <a href="https://epresensi.kulonprogokab.go.id/login" target="_blank" class="btn btn-primary btn-lg">Buka</a>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card text-center bg-dark text-white h-100">
          <div class="card-body">
            <h3 class="card-title">E-Kinerja</h3>
            <p class="card-text">Laporin kegiatan bulananmu ke BKN</p>
            <a href="https://kinerja.bkn.go.id/login" target="_blank" class="btn btn-primary btn-lg">Buka</a>
          </div>
        </div>
      </div>

       <div class="col">
        <div class="card text-center bg-dark text-white h-100">
          <div class="card-body">
            <h3 class="card-title">Puskesmas Girimulyo II</h3>
            <p class="card-text">Sorry lagi maintenance</p>
            <a href="https://puskesmasgirimulyo2.com" target="_blank" class="btn btn-primary btn-lg">Buka</a>
          </div>
        </div>
      </div>
      <!-- Tambah kotak lain sesuka hati, copy-paste blok <div class="col"> di atas -->
      
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
