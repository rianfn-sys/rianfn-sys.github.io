<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Contoh Card</title>
</head>
<body>

<div class="container mt-5">
    <div class="row">
        
        <div class="col-md-4">
            <div class="card h-100">
                <img src="https://via.placeholder.com/300x150" class="card-img-top" alt="Gambar">
                <div class="card-body">
                    <h5 class="card-title">Google</h5>
                    <p class="card-text">Klik di bawah untuk menuju ke Google.</p>
                    <a href="https://www.google.com" target="_blank" class="btn btn-primary">Buka Website</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body text-center">
                    <h1 class="display-1">🌐</h1>
                    <h5 class="card-title">Website Lain</h5>
                    <p class="card-text">Card ini menggunakan ikon sebagai ganti gambar.</p>
                    <a href="https://www.wikipedia.org" target="_blank" class="btn btn-success">Kunjungi</a>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
