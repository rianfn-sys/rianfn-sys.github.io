<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal - GM II</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: #1e3a8a;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 35px;
        }
        .input-group-text {
            background-color: white;
            border-left: none;
            cursor: pointer;
            border-radius: 0 10px 10px 0;
            color: #64748b;
        }
        .form-control {
            border-radius: 10px 0 0 10px;
            padding: 12px;
            border-right: none;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }
        .input-group:focus-within {
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.2);
            border-radius: 10px;
        }
        .btn-login {
            background: #1e3a8a;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: #1e40af;
        }
        .error-msg {
            color: #dc3545;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
            background: #fee2e2;
            padding: 8px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="icon-box">
        <i class="fa-solid fa-user-shield"></i>
    </div>
    <h4 class="fw-bold text-dark mb-1">Akses Pegawai</h4>
    <p class="text-muted mb-4 small">Silakan masukkan kode akses anda</p>
    
    <div id="error-message" class="error-msg">
        <i class="fa-solid fa-circle-exclamation me-1"></i> Password salah!
    </div>

    <form id="loginForm">
        <div class="text-start mb-3">
            <label class="form-label small fw-bold text-dark">Password</label>
            <div class="input-group">
                <input type="password" id="password" class="form-control" placeholder="Masukkan password..." required>
                <span class="input-group-text" id="togglePassword">
                    <i class="fa-solid fa-eye" id="eyeIcon"></i>
                </span>
            </div>
        </div>
        <button type="submit" class="btn-login">
            LOGIN SEKARANG
        </button>
    </form>
    
    <div class="mt-4">
        <a href="index.html" class="text-decoration-none small text-muted">
            <i class="fa-solid fa-house me-1"></i> Kembali ke Beranda
        </a>
    </div>
</div>

<script>
    // Logika Toggle Lihat Password
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');
    const eyeIcon = document.querySelector('#eyeIcon');

    togglePassword.addEventListener('click', function () {
        // Toggle tipe input
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        
        // Toggle ikon
        eyeIcon.classList.toggle('fa-eye');
        eyeIcon.classList.toggle('fa-eye-slash');
    });

    // Logika Login
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const passValue = password.value;
        const errorMsg = document.getElementById('error-message');
        
        // Ganti 'pegawaiGM2' dengan password yang anda inginkan
        if (passValue === 'pegawaiGM2') {
            window.location.href = 'kantor3.html'; 
        } else {
            errorMsg.style.display = 'block';
            password.value = '';
            password.focus();
        }
    });
</script>

</body>
</html>
