<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Permohonan Cuti Pegawai Puskesmas Girimulyo II</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card-form {
            background: #ffffff;
            border: none;
            border-top: 8px solid #0d6efd; 
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        .btn-primary {
            background-color: #0d47a1;
            border: none;
            transition: 0.3s;
            font-weight: 600;
        }
        .btn-primary:hover {
            background-color: #1565c0;
            transform: translateY(-2px);
        }
        .form-label {
            color: #0d47a1;
            font-weight: 600;
        }
        /* Style untuk pesan error yang Anda minta sebelumnya */
        #loginError {
            color: #dc3545;
            font-size: 0.875em;
        }
    </style>
</head>
<body>

<div class="card-form">
    <div class="text-center mb-4">
        <h3 class="text-primary fw-bold">Formulir Permohonan Cuti Pegawai Puskesmas Girimulyo II</h3>
        <p class="text-muted small">Silakan lengkapi data Anda di bawah ini</p>
    </div>

   <form id="registrationForm">
    <div class="mb-3">
        <label class="form-label">Tanggal Permohonan</label>
        <input type="date" name="tgl_mohon" class="form-control" required>
    </div>
    
    <div class="mb-3">
        <label class="form-label">Nama Lengkap</label>
        <input type="text" name="nama" class="form-control" placeholder="Masukkan nama sesuai KTP" required>
    </div>

    <div class="mb-3">
        <label class="form-label">NIP</label>
        <input type="number" name="nip" class="form-control" placeholder="Masukkan NIP anda" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Jabatan</label>
        <input type="text" name="jabatan" class="form-control" placeholder="Masukkan jabatan anda" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Alamat</label>
        <input type="text" name="alamat" class="form-control" placeholder="Masukkan alamat cuti Anda" required>
    </div>
    
    <div class="mb-3">
        <label class="form-label">Jenis Pengajuan Cuti</label>
        <select name="jenis_cuti" class="form-select" required>
            <option selected disabled value="">Pilih opsi Anda...</option>
            <option value="Cuti tahunan">Cuti tahunan</option>
            <option value="Cuti sakit">Cuti sakit</option>
            <option value="Cuti bersalin">Cuti bersalin</option>
            </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Tanggal Mulai</label>
        <input type="date" name="tgl_mulai" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Tanggal Selesai</label>
        <input type="date" name="tgl_selesai" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Yang Dilimpahi Tugas</label>
        <input type="text" name="dilimpah_tugas" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Alasan Cuti</label>
        <input type="text" name="alasan" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Alamat Email</label>
        <input type="email" name="email" class="form-control" placeholder="contoh@mail.com" required>
    </div>

    <div id="loginError" class="mt-2 d-none fw-bold"></div>

    <div class="d-grid mt-4">
        <button type="submit" id="btnSubmit" class="btn btn-primary btn-lg">Kirim Sekarang</button>
    </div>
</form>
</div>

<script>
    //const scriptURL = 'https://script.google.com/macros/s/AKfycbyKcb9CnmkdC1mJcWM3XBs8FDXodyi79u-DfbZeUkl2i1eG1RN-BRLgqL677YuF0Rou/exec';
const scriptURL = 'https://script.google.com/macros/s/AKfycbyKcb9CnmkdC1mJcWM3XBs8FDXodyi79u-DfbZeUkl2i1eG1RN-BRLgqL677YuF0Rou/exec';
const form = document.getElementById('registrationForm');
const btnSubmit = document.getElementById('btnSubmit');
const errorDiv = document.getElementById('loginError');

// 1. SET MINIMUM TANGGAL (Agar tidak bisa pilih tanggal kemarin)
const today = new Date().toISOString().split('T')[0];
document.getElementsByName('tgl_mohon')[0].setAttribute('min', today);
document.getElementsByName('tgl_mulai')[0].setAttribute('min', today);
document.getElementsByName('tgl_selesai')[0].setAttribute('min', today);

form.addEventListener('submit', e => {
    e.preventDefault();
    
    // Ambil nilai tanggal untuk divalidasi
    const tglMulai = new Date(form.tgl_mulai.value);
    const tglSelesai = new Date(form.tgl_selesai.value);

    // 2. VALIDASI LOGIKA TANGGAL
    if (tglSelesai < tglMulai) {
        errorDiv.innerHTML = "Kesalahan: Tanggal selesai tidak boleh sebelum tanggal mulai!";
        errorDiv.classList.remove('d-none', 'text-success');
        errorDiv.classList.add('text-danger');
        return; // Hentikan proses kirim
    }

    // Jika validasi lolos, lanjutkan pengiriman
    btnSubmit.disabled = true;
    btnSubmit.innerHTML = "Sedang Mengirim...";
    errorDiv.classList.add('d-none');

    fetch(scriptURL, { 
        method: 'POST', 
        body: new FormData(form)
    })
    .then(response => {
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = "Kirim Sekarang";
        alert("Sukses! Permohonan cuti Anda telah terkirim.");
        form.reset();
        // Reset min date setelah reset form
        document.getElementsByName('tgl_mohon')[0].setAttribute('min', today);
    })
    .catch(error => {
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = "Kirim Sekarang";
        errorDiv.innerHTML = "Gagal mengirim! Periksa koneksi atau URL Script.";
        errorDiv.classList.remove('d-none');
        errorDiv.classList.replace('text-success', 'text-danger');
    });
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
