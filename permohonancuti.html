<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Permohonan Cuti Pegawai Puskesmas Girimulyo II</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card-form {
            background: #ffffff;
            border: none;
            border-top: 8px solid #0d6efd; 
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        .btn-primary {
            background-color: #0d47a1;
            border: none;
            transition: 0.3s;
            font-weight: 600;
        }
        .btn-primary:hover {
            background-color: #1565c0;
            transform: translateY(-2px);
        }
        .form-label {
            color: #0d47a1;
            font-weight: 600;
        }
        /* Style untuk pesan error yang Anda minta sebelumnya */
        #loginError {
            color: #dc3545;
            font-size: 0.875em;
        }
    </style>
</head>
<body>

<div class="card-form">
    <div class="text-center mb-4">
        <h3 class="text-primary fw-bold">Formulir Permohonan Cuti Pegawai Puskesmas Girimulyo II</h3>
        <p class="text-muted small">Silakan lengkapi data Anda di bawah ini</p>
    </div>

    <form id="registrationForm">
        <div class="mb-3">
            <label class="form-label">Tanggal Permohonan</label>
            <input type="date" class="form-control" placeholder="Masukkan tanggal hari ini" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" class="form-control" placeholder="Masukkan nama sesuai KTP" required>
        </div>

        <div class="mb-3">
            <label class="form-label">NIP</label>
            <input type="number" class="form-control" placeholder="Masukkan NIP anda" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Jabatan</label>
            <input type="text" class="form-control" placeholder="Masukkan jabaran anda" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Alamat</label>
            <input type="text" class="form-control" placeholder="Masukkan alamat cuti Anda" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Jenis Pengajuan Cuti</label>
            <select class="form-select">
                <option selected disabled>Pilih opsi Anda...</option>
                <option value="1">Cuti tahunan</option>
                <option value="2">Cuti sakit</option>
                <option value="3">Cuti bersalin</option>
                <option value="4">Cuti sakit kurang 14 hari</option>
                <option value="5">Cuti sakit lebih 14 hari</option>
                <option value="6">Cuti alasan penting</option>
                <option value="7">Cuti besar</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Tanggal Mulai</label>
            <input type="date" class="form-control" placeholder="Masukkan tanggal mulai cuti" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Tanggal Selesai</label>
            <input type="date" class="form-control" placeholder="Masukkan tanggal selesai cuti" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Yang Dilimpahi Tugas</label>
            <input type="text" class="form-control" placeholder="Masukkan nama pegawai yang dilimpahi tugas" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Alasan Cuti</label>
            <input type="text" class="form-control" placeholder="Masukkan alasan cuti Anda" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Alamat Email</label>
            <input type="email" class="form-control" placeholder="contoh@mail.com" required>
        </div>

        <div id="loginError" class="mt-2 d-none fw-bold">
            Gagal mengirim! Pastikan semua data terisi dengan benar.
        </div>

        <div class="d-grid mt-4">
            <button type="button" onclick="submitData()" class="btn btn-primary btn-lg">Kirim Sekarang</button>
        </div>
    </form>
</div>

<script>
    function submitData() {
        const errorDiv = document.getElementById('loginError');
        
        // Simulasi Validasi: Menampilkan pesan error jika diklik
        errorDiv.classList.remove('d-none');
        
        // Menghilangkan pesan error otomatis setelah 4 detik
        setTimeout(() => {
            errorDiv.classList.add('d-none');
        }, 4000);
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
