<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-custom { background-color: #1a237e; color: white; padding: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card-portal { border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-top: -50px; }
        .btn-elegant { background-color: #0d47a1; color: white; border-radius: 8px; padding: 12px; transition: 0.3s; }
        .btn-elegant:hover { background-color: #1565c0; color: white; transform: translateY(-2px); }
        .header-section { background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%); height: 200px; text-align: center; color: white; padding-top: 40px; }
        #loader { display: none; }
    </style>
</head>
<body>

    <div class="header-section">
        <h2>PORTAL SERTIFIKAT DIGITAL LOKAKARYA MINI</h2>
        <p>Pilih nama Anda untuk menerima sertifikat via Email</p>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card card-portal p-4">
                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted">Pilih Nama Lengkap</label>
                        <select id="namaSelect" class="form-select form-select-lg">
                            <option>Memuat daftar nama...</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-muted">Jenis Sertifikat</label>
                        <select id="templateSelect" class="form-select">
                            <option value="lokmin0126">Sertifikat Lokakarya Mini Januari 2026</option>
                            <option value="lokmin0226">Sertifikat Lokakarya Mini Februari 2026</option>
                            <option value="lokmin0326">Sertifikat Lokakarya Mini Maret 2026</option>
                        </select>
                    </div>

                    <button onclick="kirimData()" id="btnKirim" class="btn btn-elegant w-100">
                        Kirim Sertifikat Sekarang
                    </button>

                    <div id="loader" class="text-center mt-3">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2 text-muted">Sedang memproses PDF & Mengirim Email...</p>
                    </div>
                    
                    <div id="msg" class="mt-3 text-center fw-bold"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
       <script>
        // Ambil data nama saat halaman dibuka
        window.onload = function() {
            google.script.run.withSuccessHandler(showNames).getDataNama();
        };

        function showNames(names) {
            let select = document.getElementById('namaSelect');
            select.innerHTML = '<option value="" disabled selected>-- Pilih Nama Anda --</option>';
            names.forEach(n => {
                let opt = document.createElement('option');
                opt.value = n;
                opt.innerHTML = n;
                select.appendChild(opt);
            });
        }

        function kirimData() {
            const nama = document.getElementById('namaSelect').value;
            const template = document.getElementById('templateSelect').value;
            const btn = document.getElementById('btnKirim');
            const loader = document.getElementById('loader');
            const msgDiv = document.getElementById('msg');

            if(!nama) return alert("Pilih nama dulu ya!");

            // Reset tampilan & kunci tombol
            btn.disabled = true;
            loader.style.display = 'block';
            msgDiv.innerHTML = "";

            google.script.run
                .withSuccessHandler(res => {
                    loader.style.display = 'none';
                    btn.disabled = false;
                    
                    // Menampilkan pesan sukses dengan nomor sertifikat
                    msgDiv.innerHTML = `
                        <div class="alert alert-success border-0 shadow-sm">
                            <h5 class="mb-1">🎉 Berhasil!</h5>
                            <p class="mb-0 small">${res}</p>
                        </div>
                    `;
                })
                .withFailureHandler(err => {
                    loader.style.display = 'none';
                    btn.disabled = false;
                    msgDiv.innerHTML = `
                        <div class="alert alert-danger border-0 shadow-sm">
                            ❌ Gagal: ${err}
                        </div>
                    `;
                })
                .prosesSertifikat(nama, template);
        }
    </script>
    </script>
</body>
</html>
